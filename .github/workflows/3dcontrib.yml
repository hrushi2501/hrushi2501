name: 3D Contribution Calendar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib

    steps:
      - uses: actions/checkout@v3

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: hrushi2501
          MAX_REPOS: 10
          SETTING_JSON: |
            {
              "githubUserName": "hrushi2501",
              "startFilled": true,
              "angle": 50,
              "flatStyle": false,
              "settingMap": {
                "season-animate": "profile-3d-contrib/profile-season-animate.svg"
              }
            }

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update 3d contrib calendar"
          git push
